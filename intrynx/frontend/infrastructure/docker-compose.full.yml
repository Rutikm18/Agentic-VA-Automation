# ─────────────────────────────────────────────────────────────────────────────
# ADVERSA Platform — Full Local Development Stack
#
# Services: api, worker, agent×3, postgres, redis, neo4j,
#           kafka, zookeeper, vault (dev), minio
#
# Usage:
#   cp .env.example .env
#   docker compose -f infrastructure/docker-compose.full.yml up -d
#
# Stop:   docker compose -f infrastructure/docker-compose.full.yml down
# Wipe:   docker compose -f infrastructure/docker-compose.full.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

x-agent-defaults: &agent-defaults
  build:
    context: ./agent
    dockerfile: Dockerfile
  environment:
    PLATFORM_API_URL:    "http://api:3000"
    VAULT_ADDR:          "http://vault:8200"
    VAULT_ROLE_TOKEN:    "${VAULT_DEV_ROOT_TOKEN:-root-token}"
    TLS_CERT_PATH:       ""   # mTLS disabled in dev
    LOG_LEVEL:           "INFO"
    POLL_INTERVAL:       "10"
    HEARTBEAT_INTERVAL:  "30"
  depends_on:
    api:   { condition: service_healthy }
    vault: { condition: service_healthy }
  restart: unless-stopped

services:

  # ── ADVERSA API (Next.js) ──────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runner
    image: adversa-api:dev
    container_name: adversa-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV:                production
      NEXT_TELEMETRY_DISABLED: "1"
      ANTHROPIC_API_KEY:       "${ANTHROPIC_API_KEY:-}"
      DATABASE_URL:            "postgresql://adversa:${POSTGRES_PASSWORD:-changeme}@postgres:5432/adversa"
      REDIS_URL:               "redis://redis:6379"
      NEO4J_URI:               "bolt://neo4j:7687"
      NEO4J_USER:              "neo4j"
      NEO4J_PASSWORD:          "${NEO4J_PASSWORD:-changeme}"
      KAFKA_BROKERS:           "kafka:9092"
      MINIO_ENDPOINT:          "minio:9000"
      MINIO_ACCESS_KEY:        "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY:        "${MINIO_SECRET_KEY:-minioadmin}"
      VAULT_ADDR:              "http://vault:8200"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/agents/register"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Background Worker ──────────────────────────────────────────────────────
  worker:
    image: adversa-api:dev
    container_name: adversa-worker
    command: ["node", "worker.js"]
    environment:
      NODE_ENV:        production
      DATABASE_URL:    "postgresql://adversa:${POSTGRES_PASSWORD:-changeme}@postgres:5432/adversa"
      REDIS_URL:       "redis://redis:6379"
      KAFKA_BROKERS:   "kafka:9092"
    depends_on:
      api:      { condition: service_healthy }
      postgres: { condition: service_healthy }
      kafka:    { condition: service_started }
    restart: unless-stopped

  # ── Scanning Agents (3 instances) ─────────────────────────────────────────
  agent-corp:
    <<: *agent-defaults
    container_name: adversa-agent-corp
    environment:
      <<: *agent-defaults
      AGENT_ID:  "${AGENT_CORP_ID:-AGT-001}"
      AGENT_NAME: "corp-agent-01"
      AGENT_LOCATION: "Docker / CORP"

  agent-dmz:
    <<: *agent-defaults
    container_name: adversa-agent-dmz
    environment:
      <<: *agent-defaults
      AGENT_ID:  "${AGENT_DMZ_ID:-AGT-002}"
      AGENT_NAME: "dmz-agent-01"
      AGENT_LOCATION: "Docker / DMZ"

  agent-cloud:
    <<: *agent-defaults
    container_name: adversa-agent-cloud
    environment:
      <<: *agent-defaults
      AGENT_ID:  "${AGENT_CLOUD_ID:-AGT-003}"
      AGENT_NAME: "cloud-agent-01"
      AGENT_LOCATION: "Docker / Cloud"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: adversa-postgres
    environment:
      POSTGRES_DB:       adversa
      POSTGRES_USER:     adversa
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adversa -d adversa"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: adversa-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Neo4j (attack graph) ───────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: adversa-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH:                        "neo4j/${NEO4J_PASSWORD:-changeme}"
      NEO4J_PLUGINS:                     '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Zookeeper ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: adversa-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: adversa-kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9093}:9093"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS:             "INTERNAL://kafka:9092,EXTERNAL://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME:       INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_CREATE_TOPICS: >
        scan-jobs:12:1,
        scan-results:12:1,
        findings:24:1,
        alerts:6:1,
        audit-events:6:1
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

  # ── HashiCorp Vault (dev mode) ─────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: adversa-vault
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:    "${VAULT_DEV_ROOT_TOKEN:-root-token}"
      VAULT_DEV_LISTEN_ADDRESS:   "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── MinIO (S3-compatible artifact storage) ─────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: adversa-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER:     "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  minio-data:

networks:
  default:
    name: adversa-network
