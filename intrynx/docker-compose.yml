# ADVERSA platform — single-command install.
#
#   cp .env.docker.example .env
#   docker compose up -d --build         # postgres + redis + migrate + api
#   docker compose --profile graph up -d # also start Neo4j (attack-path graph)
#   docker compose --profile probe up -d # also start a local probe (for testing)
#
# The `migrate` service runs alembic + seeds the admin user once, then exits;
# the `api` service starts only after it succeeds.

x-backend-image: &backend-image
  build:
    context: ./backend
    args:
      INSTALL_EXTRAS: ${INSTALL_EXTRAS:-0}
  image: adversa-backend:local

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vapt}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-vapt_db}
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: ${JWT_SECRET:-change-me-at-least-32-chars-long!!}
  APP_ENV: ${APP_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  NEO4J_ENABLED: ${NEO4J_ENABLED:-false}
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-adversa-neo4j}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vapt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-vapt_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Internal-only by default — the API reaches Postgres over the compose
    # network, so we don't publish 5432 to the host (avoids "port already
    # allocated" clashes with a local Postgres). To inspect from the host, set
    # POSTGRES_PORT in .env and uncomment:
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vapt} -d ${POSTGRES_DB:-vapt_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Internal-only by default (see Postgres note). Uncomment to expose:
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5
    profiles: ["graph"]
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-adversa-neo4j}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: apply migrations + seed admin, then exit. `api` waits for success.
  migrate:
    <<: [*backend-image]
    environment:
      <<: *backend-env
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@adversa.io}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
      SEED_TENANT_NAME: ${SEED_TENANT_NAME:-Default Tenant}
    command: ["sh", "-c", "alembic upgrade head && python scripts/seed_admin.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: [*backend-image]
    environment:
      <<: *backend-env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "${API_WORKERS:-4}"]
    ports:
      - "${API_PORT:-18080}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional in-stack probe for local testing (real probes deploy on remote
  # networks — see docs/RUNBOOK.md Part B / probe/README.md). Self-registers using the seeded operator.
  probe:
    build:
      context: ./probe
    image: adversa-probe:local
    profiles: ["probe"]
    environment:
      PLATFORM_URL: http://api:8000
      OPERATOR_EMAIL: ${SEED_ADMIN_EMAIL:-admin@adversa.io}
      OPERATOR_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
      PROBE_NAME: ${PROBE_NAME:-local-probe}
      # capabilities auto-detected from the tools installed in the probe image
      PROBE_NETWORK_SEGMENTS: ${PROBE_NETWORK_SEGMENTS:-}
      LICENSE_ENFORCED: "false"   # container host-ID changes each restart; skip host-lock check
    volumes:
      - probestate:/var/lib/adversa-probe   # persist identity so restarts reuse the same agent
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Centralized dashboard (Next.js). Talks to the API server-side via a BFF
  # (BACKEND_INTERNAL_URL) — no CORS, single FastAPI JWT. Behind the `ui` profile
  # because the Next build is heavy: `make full` brings it up with everything.
  frontend:
    build:
      context: ./frontend
    image: adversa-frontend:local
    profiles: ["ui"]
    environment:
      BACKEND_INTERNAL_URL: http://api:8000
      AUTH_SECRET: ${JWT_SECRET:-change-me-at-least-32-chars-long!!}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  probestate:
